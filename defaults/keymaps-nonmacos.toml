# --------------------------------- Window ---------------------------------------------

[[keymaps]]
command = "close_window"
key = "Alt+F4"

# --------------------------------- General --------------------------------------------

[[keymaps]]
key = "ctrl+shift+n"
command = "palette"

[[keymaps]]
key = "ctrl+shift+s"
command = "save_all"

[[keymaps]]
key = "ctrl+e"
command = "recent_files"

[[keymaps]]
key = "ctrl+,"
command = "open_settings"

[[keymaps]]
key = "ctrl+k ctrl+s"
command = "open_keyboard_shortcuts"

[[keymaps]]
key = "ctrl+="
command = "zoom_in"

[[keymaps]]
key = "ctrl+-"
command = "zoom_out"

[[keymaps]]
key = "ctrl+enter"
command = "source_control_commit"
when = "source_control_focus"

# --------------------------------- Basic editing ---------------------------------------

[[keymaps]]
key = "ctrl+z"
command = "undo"

[[keymaps]]
key = "ctrl+shift+z"
command = "redo"


[[keymaps]]
key = "ctrl+y"
command = "redo"

[[keymaps]]
key = "ctrl+x"
command = "clipboard_cut"

[[keymaps]]
key = "shift+Delete"
command = "clipboard_cut"

[[keymaps]]
key = "ctrl+c"
command = "clipboard_copy"

[[keymaps]]
key = "ctrl+insert"
command = "clipboard_copy"

[[keymaps]]
key = "ctrl+v"
command = "clipboard_paste"

[[keymaps]]
key = "shift+insert"
command = "clipboard_paste"

[[keymaps]]
key = "ctrl+f"
command = "search"

[[keymaps]]
key = "ctrl+right"
command = "word_end_forward"

[[keymaps]]
key = "ctrl+left"
command = "word_backward"

[[keymaps]]
key = "ctrl+backspace"
command = "delete_word_backward"

[[keymaps]]
key = "ctrl+delete"
command = "delete_word_forward"

[[keymaps]]
key = "ctrl+shift+\\"
command = "match_pairs"

[[keymaps]]
key = "ctrl+/"
command = "toggle_line_comment"

[[keymaps]]
key = "ctrl+]"
command = "indent_line"

[[keymaps]]
key = "ctrl+["
command = "outdent_line"

[[keymaps]]
key = "ctrl+a"
command = "select_all"

[[keymaps]]
key = "ctrl+enter"
command = "new_line_below"
when = "!source_control_focus"

[[keymaps]]
key = "ctrl+shift+enter"
command = "new_line_above"

# ------------------------------------ File Management --------------------------------

[[keymaps]]
key = "ctrl+s"
command = "save"

[[keymaps]]
key = "ctrl+o"
command = "open_file"

[[keymaps]]
key = "ctrl+n"
command = "new_file"

# ----------------------------------- Editor Management -------------------------------

[[keymaps]]
key = "ctrl+w"
command = "split_close"

[[keymaps]]
key = "ctrl+k f"
command = "close_folder"

[[keymaps]]
key = "ctrl+F4"
command = "split_close"

[[keymaps]]
key = "ctrl+\\"
command = "split_vertical"

# --------------------------------- Rich Language Editing ----------------------------

[[keymaps]]
key = "ctrl+space"
command = "get_completion"

[[keymaps]]
key = "ctrl+i"
command = "get_completion"

[[keymaps]]
key = "ctrl+shift+space"
command = "get_signature"

[[keymaps]]
key = "alt+enter"
command = "show_code_actions"

# --------------------------------- Display -------------------------------------------

[[keymaps]]
key = "alt+1"
command = "toggle_file_explorer_focus"

[[keymaps]]
key = "ctrl+shift+f"
command = "toggle_search_focus"

[[keymaps]]
key = "ctrl+shift+x"
command = "toggle_plugin_focus"

[[keymaps]]
key = "alt+6"
command = "toggle_problem_focus"

# ------------------------------------ Navigation -------------------------------------

[[keymaps]]
key = "Ctrl+Home"
command = "document_start"

[[keymaps]]
key = "Ctrl+End"
command = "document_end"

[[keymaps]]
key = "ctrl+alt+shift+n"
command = "palette.symbol"

[[keymaps]]
key = "ctrl+t"
command = "palette.workspace_symbol"

[[keymaps]]
key = "ctrl+g"
command = "palette.line"

# --------------------------------- RubyMine overrides ---------------------------------

[[keymaps]]
key = "ctrl+b"
command = "goto_definition"

[[keymaps]]
key = "ctrl+d"
command = "duplicate_line_down"

[[keymaps]]
key = "ctrl+alt+left"
command = "jump_location_backward"

[[keymaps]]
key = "ctrl+alt+right"
command = "jump_location_forward"

# Unbind common ctrl+- / ctrl+shift+- (replaced by ctrl+alt+left/right above)
[[keymaps]]
key = "ctrl+-"
command = "-jump_location_backward"

[[keymaps]]
key = "ctrl+shift+-"
command = "-jump_location_forward"

[[keymaps]]
key = "alt+right"
command = "next_editor_tab"

[[keymaps]]
key = "alt+left"
command = "previous_editor_tab"
