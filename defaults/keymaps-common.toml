# --------------------------------- General --------------------------------------------

# [[keymaps]]
# key = "ctrl+q"
# command = "quit"

# --------------------------------- Basic editing ---------------------------------------

[[keymaps]]
key = "alt+shift+up"
command = "move_line_up"

[[keymaps]]
key = "alt+shift+down"
command = "move_line_down"

[[keymaps]]
key = "Delete"
command = "delete_forward"

[[keymaps]]
key = "backspace"
command = "delete_backward"

[[keymaps]]
key = "shift+backspace"
command = "delete_forward"

[[keymaps]]
key = "Home"
command = "line_start_non_blank"

[[keymaps]]
key = "End"
command = "line_end"

[[keymaps]]
key = "PageUp"
command = "page_up"

[[keymaps]]
key = "PageDown"
command = "page_down"

[[keymaps]]
key = "Ctrl+PageUp"
command = "scroll_up"

[[keymaps]]
key = "Ctrl+PageDown"
command = "scroll_down"

# ----------------------------------- Editor Management -------------------------------

# --------------------------------- Rich Language Editing ----------------------------

[[keymaps]]
key = "F2"
command = "rename_symbol"

[[keymaps]]
key = "F12"
command = "goto_definition"

# ------------------------------------ Navigation -------------------------------------

[[keymaps]]
key = "ctrl+-"
command = "jump_location_backward"

[[keymaps]]
key = "ctrl+shift+-"
command = "jump_location_forward"

# ------------------------------------ ------------ -------------------------------------

[[keymaps]]
key = "tab"
command = "jump_to_next_snippet_placeholder"
when = "in_snippet"

[[keymaps]]
key = "shift+tab"
command = "jump_to_prev_snippet_placeholder"
when = "in_snippet"

[[keymaps]]
key = "esc"
command = "clear_search"
when = "search_active || search_focus"

[[keymaps]]
key = "ctrl+shift+up"
command = "select_next_syntax_item"

[[keymaps]]
key = "ctrl+shift+down"
command = "select_previous_syntax_item"

[[keymaps]]
key = "ctrl+m"
command = "list.select"
when = "list_focus"

[[keymaps]]
key = "tab"
command = "list.select"
when = "completion_focus"

[[keymaps]]
key = "enter"
command = "list.select"
when = "list_focus"

[[keymaps]]
key = "ctrl+p"
command = "list.previous"
when = "list_focus"

[[keymaps]]
key = "up"
command = "list.previous"
when = "list_focus"

[[keymaps]]
key = "PageUp"
command = "list.previous_page"
when = "list_focus"

[[keymaps]]
key = "ctrl+n"
command = "list.next"
when = "list_focus"

[[keymaps]]
key = "down"
command = "list.next"
when = "list_focus"

[[keymaps]]
key = "PageDown"
command = "list.next_page"
when = "list_focus"

[[keymaps]]
key = "esc"
command = "modal.close"
when = "modal_focus || completion_focus"

[[keymaps]]
key = "tab"
command = "inline_completion.select"
when = "inline_completion_visible && !search_focus && !modal_focus && !list_focus && !search_active"

[[keymaps]]
key = "esc"
command = "inline_completion.cancel"
when = "inline_completion_visible && !search_focus && !modal_focus && !list_focus && !search_active"

[[keymaps]]
key = "alt+["
command = "inline_completion.previous"
when = "inline_completion_visible && !search_focus && !modal_focus && !list_focus && !search_active"

[[keymaps]]
key = "alt+]"
command = "inline_completion.next"
when = "inline_completion_visible && !search_focus && !modal_focus && !list_focus && !search_active"

[[keymaps]]
key = "alt+\\"
command = "inline_completion.invoke"
when = "!inline_completion_visible && !search_focus && !modal_focus && !list_focus && !search_active"

[[keymaps]]
key = "right"
command = "right"

[[keymaps]]
key = "left"
command = "left"

[[keymaps]]
key = "up"
command = "up"
when = "!list_focus"

[[keymaps]]
key = "down"
command = "down"
when = "!list_focus"

[[keymaps]]
key = "ctrl+h"
command = "delete_backward"

[[keymaps]]
key = "enter"
command = "insert_new_line"
when = "!list_focus && !input_focus"

[[keymaps]]
key = "tab"
command = "focus_replace_editor"
when = "search_focus"

[[keymaps]]
key = "tab"
command = "focus_find_editor"
when = "replace_focus"

[[keymaps]]
key = "shift+enter"
command = "search_backward"
when = "search_focus"

[[keymaps]]
key = "enter"
command = "search_forward"
when = "search_focus"

[[keymaps]]
key = "enter"
command = "global_search_refresh"
when = "global_search_focus"

[[keymaps]]
key = "enter"
command = "confirm_rename"
when = "rename_focus"

[[keymaps]]
key = "tab"
command = "insert_tab"
when = "!in_snippet && !completion_focus && !inline_completion_visible && !search_focus && !replace_focus"

[[keymaps]]
key = "ctrl+m"
command = "insert_new_line"
when = "!list_focus"
