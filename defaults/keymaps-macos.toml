# --------------------------------- Window ---------------------------------------------

[[keymaps]]
command = "window_close"
key = "Meta+Shift+W"

# --------------------------------- General --------------------------------------------

[[keymaps]]
key = "meta+shift+o"
command = "palette"

[[keymaps]]
key = "meta+alt+s"
command = "save_all"

[[keymaps]]
key = "meta+e"
command = "recent_files"

[[keymaps]]
key = "meta+,"
command = "open_settings"

[[keymaps]]
key = "meta+k meta+s"
command = "open_keyboard_shortcuts"

# [[keymaps]]
# key = "meta+q"
# command = "quit"

[[keymaps]]
key = "meta+="
command = "zoom_in"

[[keymaps]]
key = "meta+-"
command = "zoom_out"

[[keymaps]]
key = "meta+enter"
command = "search_modal_open_full_results"
when = "modal_focus"

[[keymaps]]
key = "meta+enter"
command = "source_control_commit"
when = "source_control_focus"

# --------------------------------- Basic editing ---------------------------------------

[[keymaps]]
key = "meta+z"
command = "undo"

[[keymaps]]
key = "meta+shift+z"
command = "redo"

[[keymaps]]
key = "meta+y"
command = "redo"

[[keymaps]]
key = "meta+x"
command = "clipboard_cut"

[[keymaps]]
key = "meta+c"
command = "clipboard_copy"

[[keymaps]]
key = "meta+v"
command = "clipboard_paste"

[[keymaps]]
key = "meta+f"
command = "search"

[[keymaps]]
key = "alt+right"
command = "word_end_forward"

[[keymaps]]
key = "alt+left"
command = "word_backward"

[[keymaps]]
key = "meta+left"
command = "line_start_non_blank"

[[keymaps]]
key = "meta+right"
command = "line_end"

[[keymaps]]
key = "ctrl+a"
command = "line_start_non_blank"

[[keymaps]]
key = "ctrl+e"
command = "line_end"

[[keymaps]]
key = "meta+backspace"
command = "delete_line"

[[keymaps]]
key = "alt+backspace"
command = "delete_word_backward"

[[keymaps]]
key = "ctrl+k"
command = "delete_to_end_of_line"

[[keymaps]]
key = "alt+delete"
command = "delete_word_forward"

[[keymaps]]
key = "meta+shift+\\"
command = "match_pairs"

[[keymaps]]
key = "meta+/"
command = "toggle_line_comment"

[[keymaps]]
key = "meta+]"
command = "indent_line"

[[keymaps]]
key = "meta+["
command = "outdent_line"

[[keymaps]]
key = "meta+a"
command = "select_all"

[[keymaps]]
key = "meta+enter"
command = "new_line_below"
when = "editor_focus && !modal_focus"

[[keymaps]]
key = "meta+shift+enter"
command = "new_line_above"

[[keymaps]]
key = "meta+shift+c"
command = "copy_file_path"

# ------------------------------------ File Management --------------------------------

[[keymaps]]
key = "meta+s"
command = "save"

[[keymaps]]
key = "meta+o"
command = "open_file"

[[keymaps]]
key = "meta+n"
command = "new_file"

# ----------------------------------- Editor Management -------------------------------

[[keymaps]]
key = "meta+w"
command = "split_close"

[[keymaps]]
key = "meta+k f"
command = "close_folder"

[[keymaps]]
key = "meta+shift+d"
command = "split_horizontal"

# --------------------------------- Rich Language Editing ----------------------------

[[keymaps]]
key = "ctrl+space"
command = "get_completion"

[[keymaps]]
key = "meta+i"
command = "get_completion"

[[keymaps]]
key = "ctrl+shift+space"
command = "get_signature"

[[keymaps]]
key = "alt+enter"
command = "show_code_actions"

# --------------------------------- Display -------------------------------------------

[[keymaps]]
key = "meta+1"
command = "toggle_file_explorer_focus"

[[keymaps]]
key = "meta+shift+f"
command = "toggle_search_focus"

[[keymaps]]
key = "meta+shift+x"
command = "toggle_plugin_focus"

[[keymaps]]
key = "meta+6"
command = "toggle_problem_focus"

# ------------------------------------ Navigation -------------------------------------

[[keymaps]]
key = "meta+up"
command = "document_start"

[[keymaps]]
key = "meta+down"
command = "document_end"

[[keymaps]]
key = "ctrl+f"
command = "right"

[[keymaps]]
key = "ctrl+p"
command = "up"
when = "!list_focus"

[[keymaps]]
key = "ctrl+n"
command = "down"
when = "!list_focus"

[[keymaps]]
key = "meta+alt+o"
command = "palette.symbol"

[[keymaps]]
key = "meta+t"
command = "palette.workspace_symbol"

[[keymaps]]
key = "meta+l"
command = "palette.line"

# --------------------------------- RubyMine overrides ---------------------------------

[[keymaps]]
key = "meta+alt+left"
command = "jump_location_backward"

[[keymaps]]
key = "meta+alt+right"
command = "jump_location_forward"

[[keymaps]]
key = "meta+b"
command = "goto_definition"

[[keymaps]]
key = "meta+d"
command = "split_vertical"

[[keymaps]]
key = "alt+up"
command = "select_next_syntax_item"

[[keymaps]]
key = "alt+down"
command = "select_previous_syntax_item"

# Unbind common ctrl+- / ctrl+shift+- (replaced by meta+alt+left/right above)
[[keymaps]]
key = "ctrl+-"
command = "-jump_location_backward"

[[keymaps]]
key = "ctrl+shift+-"
command = "-jump_location_forward"

[[keymaps]]
key = "meta+shift+]"
command = "next_editor_tab"

[[keymaps]]
key = "meta+shift+["
command = "previous_editor_tab"
