<svg version="1.1" width="2880" height="2880" viewBox="0 0 2880 2880" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B68EE;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="1440" cy="1440" r="1300" fill="none" stroke="currentColor" stroke-width="80" opacity="0.15"/>
  <!-- Magnifying glass body (the "delve" / search metaphor) -->
  <circle cx="1280" cy="1200" r="620" fill="none" stroke="currentColor" stroke-width="160" stroke-linecap="round"/>
  <!-- Magnifying glass handle -->
  <line x1="1740" y1="1660" x2="2200" y2="2120" stroke="currentColor" stroke-width="160" stroke-linecap="round"/>
  <!-- Code brackets inside the lens: < /> -->
  <!-- Left bracket < -->
  <polyline points="1120,1000 920,1200 1120,1400" fill="none" stroke="currentColor" stroke-width="120" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket > -->
  <polyline points="1440,1000 1640,1200 1440,1400" fill="none" stroke="currentColor" stroke-width="120" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Forward slash / between brackets -->
  <line x1="1340" y1="960" x2="1200" y2="1440" stroke="currentColor" stroke-width="100" stroke-linecap="round"/>
</svg>
